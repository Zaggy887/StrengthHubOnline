    <meta name="description" content="Transform your body and mind with YCFITNESS. Expert online personal training tailored to your goals, schedule, and lifestyle.">
    <link rel="preconnect" href="https://fonts.googleapis.com">

  <body>
    <!-- Hidden form for Netlify detection at build time -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="goals"></textarea>
      <input name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
